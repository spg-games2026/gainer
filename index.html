<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gainer 60kg | Dashboard</title>
    <style>
        :root { --accent: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ff4b4b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 500px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--accent); font-size: 1.5rem; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .progress-bar { background: #334155; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        #fill { background: var(--accent); height: 100%; transition: width 0.5s ease; }
        h3 { margin-top: 0; font-size: 1.1rem; border-left: 4px solid var(--accent); padding-left: 10px; }
        label { display: block; font-size: 0.8rem; margin: 10px 0 5px; opacity: 0.8; }
        input, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        button { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px; font-size: 12px; margin-top: 15px; opacity: 0.7; }
        .btn-delete:hover { opacity: 1; background: var(--danger); color: white; }
        .history-item { background: #334155; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 4px solid var(--accent); }
        .history-item strong { color: var(--accent); font-size: 1.1rem; }
        .log-content { white-space: pre-line; font-size: 0.9rem; margin-top: 8px; border-top: 1px solid #475569; padding-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Mission 60kg</h1>
        <p>Current: <span id="cur">55.5</span>kg | Target: 60kg</p>
        <div class="progress-bar"><div id="fill" style="width: 0%"></div></div>
    </div>

    <div class="card">
        <h3>Nutrition Log</h3>
        <label>Total Calories Today</label>
        <input type="number" id="calInput" placeholder="e.g. 2432">
        <label>Meal Breakdown (Foods eaten)</label>
        <textarea id="mealInput" rows="4" placeholder="Breakfast: ...&#10;Lunch: ..."></textarea>
    </div>

    <div class="card">
        <h3>Workout & Weight</h3>
        <label>Today's Weight (kg)</label>
        <input type="number" id="weightInput" step="0.1" value="55.5">
        <label>Exercise Detail</label>
        <textarea id="workInput" rows="3" placeholder="Pushups, Squats, etc."></textarea>
        <button onclick="saveLog()">Save Daily Entry</button>
    </div>

    <div id="historySection"></div>
    
    <button class="btn-delete" onclick="deleteLast()">Delete Last Entry</button>
</div>

<script>
    const GOAL = 60;
    const START = 55.5;

    function saveLog() {
        const entry = {
            date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }),
            weight: document.getElementById('weightInput').value || 55.5,
            cals: document.getElementById('calInput').value || 0,
            meals: document.getElementById('mealInput').value || 'No data',
            work: document.getElementById('workInput').value || 'Rest'
        };

        let logs = JSON.parse(localStorage.getItem('gainer_data') || '[]');
        logs.unshift(entry);
        localStorage.setItem('gainer_data', JSON.stringify(logs));
        render();
        alert("Success! Entry Saved.");
    }

    function deleteLast() {
        if(confirm("Delete the most recent entry?")) {
            let logs = JSON.parse(localStorage.getItem('gainer_data') || '[]');
            logs.shift();
            localStorage.setItem('gainer_data', JSON.stringify(logs));
            render();
        }
    }

    function render() {
        let logs = JSON.parse(localStorage.getItem('gainer_data') || '[]');
        const lastWeight = logs.length > 0 ? parseFloat(logs[0].weight) : START;
        
        document.getElementById('cur').innerText = lastWeight;
        const progress = ((lastWeight - START) / (GOAL - START)) * 100;
        document.getElementById('fill').style.width = Math.max(0, Math.min(100, progress)) + "%";

        const hist = document.getElementById('historySection');
        hist.innerHTML = '<h3 style="margin-top:20px;">Recent Logs</h3>';
        logs.forEach(l => {
            hist.innerHTML += `
                <div class="history-item">
                    <strong>${l.date} — ${l.weight}kg</strong>
                    <div class="log-content">
                        <strong>🔥 ${l.cals} kcal</strong>
                        \n🍽️ ${l.meals}
                        \n💪 ${l.work}
                    </div>
                </div>`;
        });
    }
    render();
</script>

</body>
</html>
